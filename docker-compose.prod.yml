version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: sadakai-api:latest
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - API_KEY=${API_KEY}
      - MODEL_PATH=/app/weights/best.pt
    ports:
      - "8000:8000"
    volumes:
      - ./model/weights:/app/weights:ro
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: sadakai-dashboard:latest
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - "3000:3000"

  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sadakai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sadakai_secret}
      - POSTGRES_DB=${POSTGRES_DB:-sadakai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sadakai} -d ${POSTGRES_DB:-sadakai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
